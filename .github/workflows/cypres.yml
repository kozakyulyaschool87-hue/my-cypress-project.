name: Cypress Tests

on:

  push:

    branches:

      - main

jobs:

  cypress-run:

    runs-on: ubuntu-latest

    defaults:
      run:

        working-directory: my-cypress-project
      
    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 20

      - name: Install dependencies

        run: npm install

      - name: Run Cypress tests

        run: npx cypress run